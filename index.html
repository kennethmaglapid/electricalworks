<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MGLPD Solar Calculator</title>

<style>
body { font-family: Arial; margin:0; background:#121212; color:white; }
.container { padding:20px; }
h2 { text-align:center; }
.card { background:#1e1e1e; padding:15px; border-radius:12px; margin-bottom:15px; }
input, select { width:100%; padding:12px; margin-top:8px; border-radius:8px; border:none; background:#333; color:white; }
button { width:100%; padding:15px; margin-top:10px; border-radius:10px; border:none; background:#00c853; color:white; font-size:16px; }
button:hover { background:#00a844; }
.mode-buttons button { background:#2962ff; }
.mode-buttons button.active { background:#0039cb; }
.results { background:#263238; padding:15px; border-radius:12px; margin-top:20px; white-space:pre-line; }
/* LIGHT MODE */
.light { background:#f5f5f5; color:#111; }
.light .card { background:#fff; }
.light input, .light select { background:#e0e0e0; color:#000; }
.light .results { background:#e3f2fd; color:#000; }
.light button { background:#1976d2; }
.light .mode-buttons button { background:#90caf9; }
.light .mode-buttons button.active { background:#1565c0; }
</style>
</head>
<body>

<div class="container">
  <div style="position:absolute; top:10px; right:20px; font-size:14px;">
    <span id="viewCounter">Views: 0</span>
  </div>  

  <div style="text-align:right; margin-bottom:10px;">
    <button onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
  </div>

  <h2>⚡ MGLPD</h2>
  <p style="text-align:center; font-weight:bold;">Solar Calculator</p>

  <div class="card mode-buttons">
    <button onclick="setMode('design')" id="btnDesign">🔧 Full System</button>
  </div>

  <div class="card" id="inputs"></div>

  <div class="card">
    <label>System Voltage</label>
    <select id="voltage">
      <option value="12">12V</option>
      <option value="24">24V</option>
      <option value="48">48V</option>
    </select>

    <label>Battery Type</label>
    <select id="batteryType">
      <option value="lifepo4">LiFePO4</option>
      <option value="lead">Lead Acid / AGM</option>
    </select>

    <label>Panel Watt (per panel)</label>
    <input id="panelWatt" placeholder="e.g. 470">
    <button onclick="calculate()">CALCULATE</button>
  </div>

  <div class="results" id="results"></div>
</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js"></script>

<script>
  // ==================== THEME (LIGHT/DARK) ====================
  window.onload = function () {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "light") {
      document.body.classList.add("light");
      document.getElementById("themeBtn").innerText = "☀️ Light";
    }
  };
  function toggleTheme() {
    document.body.classList.toggle("light");
    const btn = document.getElementById("themeBtn");
    if (document.body.classList.contains("light")) {
      btn.innerText = "☀️ Light";
      localStorage.setItem("theme", "light");
    } else {
      btn.innerText = "🌙 Dark";
      localStorage.setItem("theme", "dark");
    }
  }

  // ==================== MODES ====================
  let mode = "design";
  function setMode(m) {
    mode = m;
    document.querySelectorAll(".mode-buttons button").forEach(b => b.classList.remove("active"));
    document.getElementById("btn" + capitalize(m)).classList.add("active");
    renderInputs();
    document.getElementById("results").innerText = "";
  }
  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
 function renderInputs() {
  document.getElementById("inputs").innerHTML = `
    <label>Load (W)</label>
    <input id="load">

    <label>Hours/day</label>
    <input id="hours">

    <label>Your Battery (Ah)</label>
    <input id="battery">

    <label>Solar Distance (panel → controller) (meters)</label>
    <input id="solarDistance" placeholder="e.g. 5">

    <label>Battery Distance (battery → inverter) (meters)</label>
    <input id="batteryDistance" placeholder="e.g. 2">
  `;
}


// ==================== CALCULATOR ====================
function calculate() {
  const V = parseFloat(document.getElementById("voltage").value);
  const batteryType = document.getElementById("batteryType").value;
  const panelWatt = parseFloat(document.getElementById("panelWatt").value) || 470;
  const load = parseFloat(document.getElementById("load").value);
  const hours = parseFloat(document.getElementById("hours").value);
  const batt = parseFloat(document.getElementById("battery").value);
  const solarDistance = parseFloat(document.getElementById("solarDistance").value);
  const batteryDistance = parseFloat(document.getElementById("batteryDistance").value);

  if (isNaN(load) || isNaN(hours) || isNaN(batt) || isNaN(solarDistance) || isNaN(batteryDistance)) {
    return alert("Fill all fields correctly");
  }

  // Constants
  const sunHours = 4.5;
  const systemLoss = 1.3;
  const dod = batteryType === "lifepo4" ? 0.9 : 0.5;
  const battEfficiency = batteryType === "lifepo4" ? 0.95 : 0.85;
  const Wh = load * hours;

  // Solar requirement
  const solar = Math.ceil((Wh * systemLoss) / sunHours);

  // Panel configuration
  const panelNominalVoltage = 12;
  const panelsInSeries = V > 12 ? Math.ceil(V / panelNominalVoltage) : 1;
  const panelsParallel = Math.ceil(solar / (panelWatt * panelsInSeries));
  const totalPanels = panelsInSeries * panelsParallel;

  // Currents and wires
  const stringVoltage = panelNominalVoltage * panelsInSeries;
  const panelCurrentPerString = panelWatt / stringVoltage;
  const totalPanelCurrent = panelCurrentPerString * panelsParallel;
  const solarWire = wireSize(totalPanelCurrent, solarDistance);
 
  const inverterW = parseFloat(inverterSize(load).replace("W",""));
  const batteryCurrent = inverterW / V;
  const batteryWire = wireSize(batteryCurrent, batteryDistance);

  // Breakers
  // ---- REALISTIC BATTERY / LOAD BREAKER ----
const batteryCurrentActual = load / V; // actual load current in A
function realisticBatteryBreaker(a){
  const standard = [5,10,15,20,25,30,35,40,50,60,70,80,100];
  for(let s of standard){
    if(a <= s) return s + "A";
  }
  return "100A+";
}
  // Voltage suggestion
  let voltageSuggestion = "";
// ---- REALISTIC BATTERY BREAKER WARNING ----
const batteryBreaker = realisticBatteryBreaker(Math.ceil(batteryCurrentActual * 1.25));
const batteryCurrentWithMargin = batteryCurrentActual * 1.25; // 25% safety margin
const breakerValue = parseInt(batteryBreaker); // numeric breaker value

// Clear previous battery warning (if any)
voltageSuggestion = voltageSuggestion.replace(/💡 Warning: Battery current.*\n?/g, "");

// Only show warning if actual current exceeds breaker
if (!isNaN(breakerValue) && batteryCurrentWithMargin > breakerValue) {
  voltageSuggestion += `💡 Warning: Battery current (${batteryCurrentWithMargin.toFixed(1)}A) exceeds breaker (${batteryBreaker}).\n`;
}
// ---- REALISTIC SOLAR BREAKER ----
// Use panel Isc approximation: panelWatt / 12V for 12V panels (or adjust for actual panel Voc/Isc if known)
const panelIsc = panelWatt / panelNominalVoltage;
function realisticSolarBreaker(a){
const standard = [5,10,15,20,25,30,35,40,50,60,70,80,100];
  for(let s of standard){
    if(a <= s) return s + "A";
  }
  return "80A+";
}
const solarBreaker = realisticSolarBreaker(Math.ceil(panelIsc * 1.25));

  // Battery runtime
  const inverterEff = 0.9;
  const runtimeHours = (batt * V * dod * battEfficiency * inverterEff) / load;
  const totalSeconds = runtimeHours * 3600;
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = Math.floor(totalSeconds % 60);

  // Battery requirement
  const battNeed = Math.ceil(Wh / (V * dod * battEfficiency));
  const deficitAh = battNeed - batt;

  // Status
  let status = "";
  if (batt >= battNeed) {
    status = "✅ SYSTEM OK (Battery is enough)";
  } else {
    const missingHours = hours - runtimeHours;
    const missTotalSec = missingHours * 3600;
    const mh = Math.floor(missTotalSec / 3600);
    const mm = Math.floor((missTotalSec % 3600) / 60);
    status = `⚠️ BATTERY TOO SMALL
Missing: ${deficitAh.toFixed(0)}Ah
Short by: ${mh} hr ${mm} min`;
  }

  let runtimeText = batt >= battNeed
    ? `⏱ Your ${batt}Ah battery can run your load for:\n${h} hr ${m} min ${s} sec`
    : `⏱ Your ${batt}Ah battery will ONLY last:\n${h} hr ${m} min ${s} sec`;

let panelLayout = "";
let solarBreakerDisplay = solarBreaker;
if (V === 12 && parseInt(solarBreaker) < totalPanelCurrent * 1.25) {
  // show warning only if really needed
}
if (V === 12) {
  panelLayout = "Connection: Parallel";

  // Compare actual panel current with breaker (with 25% safety margin)
  const actualCurrentWithMargin = totalPanelCurrent * 1.25;
  const solarBreakerValue = parseInt(solarBreaker);

  // Clear previous solar warning
  solarBreakerDisplay = solarBreakerDisplay.replace(/⚠️.*Current exceeds breaker rating/g, "");

  // Only show warning if current is dangerously high, e.g., above 40A
  if (!isNaN(solarBreakerValue) && solarBreakerValue >= 80 && V === 12) {
    voltageSuggestion += `⚠️ WARNING: Solar breaker reached ${solarBreaker}. This is too high for a 12V system. Upgrade to 24V or 48V.\n`;
solarBreakerDisplay += " ⚠️ <span style='color:#ff1744;'>80A LIMIT REACHED</span>";
  }
} else {
  // 24V / 48V systems
  panelLayout = `Series per string: ${panelsInSeries}, Parallel strings: ${panelsParallel}, Total panels: ${totalPanels}`;
}
  // Controller
  const controller = controllerSize((solar / V) * 1.25);

  // Render complete results
  let resultHTML = `
<div style="padding:4px; line-height:1.1; font-size:12px;">
  <h3 style="text-align:center; color:#00c853; margin:2px 0 4px 0; font-size:14px;">⚡ RESULT</h3>
  ${voltageSuggestion ? `<p style="color:#ffd600; font-size:12px; margin-bottom:5px;">${voltageSuggestion}</p>` : ''}

  <div style="margin:0 0 2px 0; padding:3px 5px; border:1px solid #00c853; border-radius:4px; background:${document.body.classList.contains('light') ? '#e8f5e9' : '#1e1e1e'}; color:${document.body.classList.contains('light') ? '#111' : '#fff'}">
    <strong>🔋 Battery (${batteryType.toUpperCase()})</strong>
    <p style="margin:1px 0; font-size:12px;">Needed: <span style="color:#ffea00;">${battNeed}Ah</span> | Your: <span style="color:#00b0ff;">${batt}Ah</span></p>
    <p style="margin:1px 0; font-size:12px;">${runtimeText}</p>
  </div>

  <div style="margin:0 0 2px 0; padding:3px 5px; border:1px solid #ffd600; border-radius:4px; background:${document.body.classList.contains('light') ? '#fff8e1' : '#1e1e1e'}; color:${document.body.classList.contains('light') ? '#111' : '#fff'}">
    <strong>☀️ Solar</strong>
    <p style="margin:1px 0; font-size:12px;">Needed: <span style="color:#ffea00;">${solar} W</span> | Panels: <span style="color:#00b0ff;">${totalPanels}</span> x ${panelWatt}W</p>
   <p style="margin:1px 0; font-size:12px;">${panelLayout}</p>
<p style="margin:1px 0; font-size:12px;">Breaker: <span style="color:#ff1744;">${solarBreakerDisplay}</span></p>
    <p style="margin:1px 0; font-size:12px;">Wire: ${solarWire}, ${solarDistance} m, Current: ${totalPanelCurrent.toFixed(2)}A</p>
  </div>

  <div style="margin:0 0 2px 0; padding:3px 5px; border:1px solid #29b6f6; border-radius:4px; background:${document.body.classList.contains('light') ? '#e1f5fe' : '#1e1e1e'}; color:${document.body.classList.contains('light') ? '#111' : '#fff'}">
    <strong>🔌 Battery → Inverter</strong>
    <p style="margin:1px 0; font-size:12px;">Wire: ${batteryWire}, ${batteryDistance} m, Current: ${batteryCurrent.toFixed(2)}A</p>
    <p style="margin:1px 0; font-size:12px;">Breaker: <span style="color:#ff1744;">${batteryBreaker}</span></p>
    <p style="margin:1px 0; font-size:12px;">Inverter: ${inverterSize(load)} | Controller: ${controller}</p>
  </div>

  <div style="margin:0; padding:3px 5px; border-radius:4px; background:${batt >= battNeed ? (document.body.classList.contains('light') ? '#c8e6c933' : '#00c85333') : (document.body.classList.contains('light') ? '#ffebee33' : '#ff174433')}; color:${document.body.classList.contains('light') ? '#111' : '#fff'}">
    <strong>Status:</strong> ${status}
  </div>
</div>`;

  document.getElementById("results").innerHTML = resultHTML;
}

  function wireSize(current, distance) {
  const drop = (current * distance) / 10;

  if (drop <= 10) return "2.5 mm² (14 AWG)";
  if (drop <= 20) return "4 mm² (12 AWG)";
  if (drop <= 30) return "6 mm² (10 AWG)";
  if (drop <= 50) return "10 mm² (8 AWG)";
  return "16 mm² (6 AWG)";
}
  function inverterSize(load) {
    let size = load * 1.5;
    if (size <= 300) return "300W";
    if (size <= 500) return "500W";
    if (size <= 1000) return "1000W";
    if (size <= 1500) return "1500W";
    return Math.ceil(size / 500) * 500 + "W";
  }

function controllerSize(a){
  const sizes = [10,20,30,40,50,60,80,100];
  for(let s of sizes){
    if(a <= s) return s + "A";
  }
  return "100A+";
}
function nearest(a){
  const sizes=[10,15,20,25,30,40,50,60,80,100,125];
  for(let s of sizes){
    if(a <= s) return s + "A";
  }
  return "125A+";
}

  setMode("design");

  // ==================== FIREBASE CONFIG ====================
  const firebaseConfig = {
    apiKey: "AIzaSyDHIjD-VVxdee3G8mVAix_rKnZ-uH-428Y",
    authDomain: "views-7f735.firebaseapp.com",
    databaseURL: "https://views-7f735-default-rtdb.firebaseio.com",
    projectId: "views-7f735",
    storageBucket: "views-7f735.firebasestorage.app",
    messagingSenderId: "596752743706",
    appId: "1:596752743706:web:e91eb138aff3aa7d31c0a3"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const functions = firebase.functions();

  // ==================== SECURE VIEW COUNTER ====================
  let userId = localStorage.getItem("userId");
  if (!userId) {
    userId = "user_" + Math.random().toString(36).substr(2,9);
    localStorage.setItem("userId", userId);

    // Call Cloud Function to increment view safely
    const incrementView = functions.httpsCallable("incrementView");
    incrementView({ userId })
      .then(res => console.log("View counted:", res.data))
      .catch(err => console.error(err));
  }

  // Live total views
  db.ref("views").on("value", (snapshot) => {
    document.getElementById("viewCounter").innerText =
      "Views: " + (snapshot.val() || 0);
  });
</script>

</body>
</html>
