<html lang="en">
<head>
<meta charset="UTF-8">
<title>MGLPD Solar Calculator</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #121212;

  padding: 20px;

  background: #263238;

  background: #f5f5f5;
  color: #111;
}

.light .card {
  background: #ffffff;
}

.light input, 
.light select {
  background: #e0e0e0;
  color: #000;
}

  background: #e3f2fd;
  color: #000;
}

  background: #1976d2;

<body>

<div class="container">
  <div style="text-align:right; margin-bottom:10px;">
    <button onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
  </div>

  <h2>⚡ MGLPD</h2>
  <p style="text-align:center; font-weight:bold;">Solar Calculator</p>

  <div class="card mode-buttons">
    <button onclick="setMode('design')" id="btnDesign">🔧 Full System</button>
  </div>

  <div class="card" id="inputs"></div>

  <div class="card">
    <label>System Voltage</label>
    <select id="voltage">
      <option value="12">12V</option>
      <option value="24">24V</option>
      <option value="48">48V</option>
    </select>

    <label>Battery Type</label>
    <select id="batteryType">
      <option value="lifepo4">LiFePO4</option>
      <option value="lead">Lead Acid / AGM</option>
    </select>

    <label>Panel Watt (per panel)</label>
    <input id="panelWatt" placeholder="e.g. 470">
    <button onclick="calculate()">CALCULATE</button>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
// DARK MODE TOGGLE (unchanged)
window.onload = function () {
  const savedTheme = localStorage.getItem("theme");
  if (savedTheme === "light") {
    document.body.classList.add("light");
    document.getElementById("themeBtn").innerText = "☀️ Light";
  }
};

function toggleTheme() {
  document.body.classList.toggle("light");
  const btn = document.getElementById("themeBtn");
  if (document.body.classList.contains("light")) {
    btn.innerText = "☀️ Light";
    localStorage.setItem("theme", "light");
  } else {
    btn.innerText = "🌙 Dark";
    localStorage.setItem("theme", "dark");
  }
}

// MODES
let mode = "design";

function setMode(m) {
  mode = m;
  document.querySelectorAll(".mode-buttons button").forEach(b => b.classList.remove("active"));
  document.getElementById("btn" + capitalize(m)).classList.add("active");
  renderInputs();
  document.getElementById("results").innerText = "";
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function renderInputs() {
  document.getElementById("inputs").innerHTML = `
    <label>Load (W)</label>
    <input id="load">
    <label>Hours/day</label>
    <input id="hours">
    <label>Your Battery (Ah)</label>
    <input id="battery">
    <label>Wire Distance (meters)</label>
    <input id="distance" placeholder="e.g. 5">
  `;
}

// ✅ FIXED CALCULATIONS
function calculate() {
  const V = parseFloat(document.getElementById("voltage").value);
  const batteryType = document.getElementById("batteryType").value;
  const panelWatt = parseFloat(document.getElementById("panelWatt").value) || 470;

  const load = parseFloat(document.getElementById("load").value);
  const hours = parseFloat(document.getElementById("hours").value);
  const batt = parseFloat(document.getElementById("battery").value);
  const distance = parseFloat(document.getElementById("distance").value);

  if (!load || !hours || !batt || !distance) return alert("Fill all fields");

  // ✅ REAL VALUES
  const sunHours = 4.5; // Philippines average
  const systemLoss = 1.3; // 30% losses
  const dod = batteryType === "lifepo4" ? 0.9 : 0.5;

  const Wh = load * hours;

  // ✅ SOLAR (FIXED)
  const solar = Math.ceil((Wh * systemLoss) / sunHours);

  // ✅ PANELS
  const panels = Math.ceil(solar / panelWatt);

  // ✅ BATTERY (FIXED)
  const battNeed = Math.ceil(Wh / (V * dod));

  // ✅ CONTROLLER (FIXED)
  const controller = Math.ceil((solar / V) * 1.25);

  // ✅ CURRENT
  const current = load / V;

  // ✅ BREAKERS (FIXED)
  const solarBreaker = nearest((solar / V) * 1.25);
  const batteryBreaker = nearest((load / V) * 2); // surge safe

  // ✅ RUNTIME (FIXED)
  const runtime = (batt * V * dod) / load;

  let result = `
🔋 Battery Needed: ${battNeed}Ah (${batteryType.toUpperCase()})
☀️ Solar Needed: ${solar}W
🔢 Panels Needed: ${panels} pcs (${panelWatt}W each)

⚡ Charge Controller: ${controller}A
🔌 Inverter: ${inverterSize(load)}

📏 Wire Size: ${wireSize(current, distance)}
📏 Distance: ${distance} m
⚡ Current: ${current.toFixed(2)} A

🧯 Solar Breaker: ${solarBreaker}
🔋 Battery Breaker: ${batteryBreaker}

Your battery runs ≈ ${runtime.toFixed(1)} hrs
`;

  document.getElementById("results").innerText = result;
}

// ✅ IMPROVED WIRE CALC
function wireSize(current, distance) {
  const dropFactor = distance / 10;

  if (current * dropFactor <= 10) return "2.5 mm² (14 AWG)";
  if (current * dropFactor <= 20) return "4 mm² (12 AWG)";
  if (current * dropFactor <= 30) return "6 mm² (10 AWG)";
  if (current * dropFactor <= 50) return "10 mm² (7 AWG)";
  return "16 mm² (5 AWG)";
}

// ✅ BETTER INVERTER HEADROOM
function inverterSize(load) {
  let size = load * 1.5;

  if (size <= 300) return "300W";
  if (size <= 500) return "500W";
  if (size <= 1000) return "1000W";
  if (size <= 1500) return "1500W";
  return Math.ceil(size / 500) * 500 + "W";
}

// BREAKER SIZES
function nearest(a){
  const sizes=[10,15,20,25,30,40,50,60,80,100,125];
  for(let s of sizes){
    if(a<=s) return s+"A";
  }
  return "125A+";
}

// INIT
setMode("design");
</script>

</body>
</html>
