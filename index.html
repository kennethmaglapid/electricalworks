<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MGLPD Solar Calculator</title>
<style>
body { font-family: Arial; margin:0; background:#121212; color:white; }
.container { padding:20px; }
h2 { text-align:center; }
.card { background:#1e1e1e; padding:15px; border-radius:12px; margin-bottom:15px; }
input, select { width:100%; padding:12px; margin-top:8px; border-radius:8px; border:none; background:#333; color:white; }
button { width:100%; padding:15px; margin-top:10px; border-radius:10px; border:none; background:#00c853; color:white; font-size:16px; cursor:pointer; }
button:hover { background:#00a844; }
.mode-buttons button { background:#2962ff; }
.mode-buttons button.active { background:#0039cb; }
.results { background:#263238; padding:15px; border-radius:12px; margin-top:20px; white-space:pre-line; }
/* LIGHT MODE */
.light { background:#f5f5f5; color:#111; }
.light .card { background:#fff; }
.light input, .light select { background:#e0e0e0; color:#000; }
.light .results { background:#e3f2fd; color:#000; }
.light button { background:#1976d2; }
.light .mode-buttons button { background:#90caf9; }
.light .mode-buttons button.active { background:#1565c0; }
</style>
</head>
<body>
<div class="container">
  <div style="position:absolute; top:10px; right:20px; font-size:14px;">
    <span id="viewCounter">Views: 0</span>
  </div>  
  <div style="text-align:right; margin-bottom:10px;">
    <button onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
  </div>
  <h2>⚡ MGLPD</h2>
  <p style="text-align:center; font-weight:bold;">Solar Calculator</p>

  <div class="card mode-buttons">
    <button onclick="setMode('design')" id="btnDesign">🔧 Full System</button>
  </div>

  <div class="card" id="inputs"></div>

  <div class="card">
    <label>System Voltage</label>
    <select id="voltage">
      <option value="12">12V</option>
      <option value="24">24V</option>
      <option value="48">48V</option>
    </select>

    <label>Battery Type</label>
    <select id="batteryType">
      <option value="lifepo4">LiFePO4</option>
      <option value="lead">Lead Acid / AGM</option>
    </select>

    <label>Panel Watt (per panel)</label>
    <input id="panelWatt" placeholder="e.g. 470">
    <label>Number of Panels</label>
    <input id="numPanels" placeholder="e.g. 2">

    <label>Connection Type</label>
    <select id="connectionType">
      <option value="auto">Auto (Recommended)</option>
      <option value="parallel">Parallel</option>
      <option value="series">Series</option>
    </select>
    <button onclick="calculate()">CALCULATE</button>
    
  </div>

  <div class="results" id="results"></div>
</div>

<script>
window.onload = function () {
  const savedTheme = localStorage.getItem("theme");
  if (savedTheme === "light") {
    document.body.classList.add("light");
    document.getElementById("themeBtn").innerText = "☀️ Light";
  }
};

function toggleTheme() {
  document.body.classList.toggle("light");
  const btn = document.getElementById("themeBtn");
  if (document.body.classList.contains("light")) {
    btn.innerText = "☀️ Light";
    localStorage.setItem("theme", "light");
  } else {
    btn.innerText = "🌙 Dark";
    localStorage.setItem("theme", "dark");
  }
}

// Modes
let mode = "design";
function setMode(m) {
  mode = m;
  document.querySelectorAll(".mode-buttons button").forEach(b => b.classList.remove("active"));
  document.getElementById("btn" + capitalize(m)).classList.add("active");
  renderInputs();
  document.getElementById("results").innerText = "";
}
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function renderInputs() {
  document.getElementById("inputs").innerHTML = `
    <label>Load (W)</label>
    <input id="load">
    <label>Hours/day</label>
    <input id="hours">
    <label>Your Battery (Ah)</label>
    <input id="battery">
    <label>Solar Distance (panel → controller) (meters)</label>
    <input id="solarDistance" placeholder="e.g. 5">
    <label>Battery Distance (battery → inverter) (meters)</label>
    <input id="batteryDistance" placeholder="e.g. 2">
  `;
}

// ==================== CALCULATOR ====================
function calculate() {
  const V = parseFloat(document.getElementById("voltage").value);
  const batteryType = document.getElementById("batteryType").value;
  const panelWatt = parseFloat(document.getElementById("panelWatt").value) || 470;
  const numPanels = parseInt(document.getElementById("numPanels").value) || 1;
  const load = parseFloat(document.getElementById("load").value);
  const hours = parseFloat(document.getElementById("hours").value);
  const batt = parseFloat(document.getElementById("battery").value);
  const solarDistance = parseFloat(document.getElementById("solarDistance").value);
  const batteryDistance = parseFloat(document.getElementById("batteryDistance").value);
  const connectionType = document.getElementById("connectionType").value;

  if ([load, hours, batt, solarDistance, batteryDistance].some(isNaN)) {
    return alert("Fill all fields correctly");
  }

  const sunHours = 4.5;
  const systemLoss = 1.3;
  const dod = batteryType === "lifepo4" ? 0.9 : 0.5;
  const battEfficiency = batteryType === "lifepo4" ? 0.95 : 0.85;
  const inverterEff = 0.9;
  const Wh = load * hours;

  // Solar requirement
  const solarNeededW = Math.ceil((Wh * systemLoss) / sunHours);
  const panelVoltage = 18; // typical
  const panelCurrent = panelWatt / panelVoltage;

  let totalVoltage, totalCurrent, connectionUsed;
  if (connectionType === "series") {
    totalVoltage = panelVoltage * numPanels;
    totalCurrent = panelCurrent;
    connectionUsed = "Series";
  } else {
    totalVoltage = panelVoltage;
    totalCurrent = panelCurrent * numPanels;
    connectionUsed = connectionType === "parallel" ? "Parallel" : "Parallel (Auto)";
  }

  // Solar breaker
  const solarBreakerCurrent = totalCurrent * 1.25;
  const solarBreakerValue = nearestBreaker(solarBreakerCurrent);

  let solarBreakerWarning = "";
  if (solarBreakerValue > 60 && connectionUsed.includes("Parallel")) {
    solarBreakerWarning = `⚠️ High current (${solarBreakerCurrent.toFixed(1)}A). Use SERIES to reduce current.`;
  }
  if (V === 12 && (panelWatt * numPanels) > 600) {
    solarBreakerWarning += `\n⚠️ Too much power for 12V → Recommend 24V system.`;
  }

  // Battery runtime
  const runtimeHours = (batt * V * dod * battEfficiency * inverterEff) / load;
  const totalSeconds = runtimeHours * 3600;
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = Math.floor(totalSeconds % 60);

  const battNeeded = Math.ceil(Wh / (V * dod * battEfficiency));
  const deficitAh = battNeeded - batt;
  let status = batt >= battNeeded
    ? "✅ SYSTEM OK (Battery is enough)"
    : `⚠️ BATTERY TOO SMALL\nMissing: ${deficitAh.toFixed(0)}Ah`;

  let runtimeText = batt >= battNeeded
    ? `⏱ Your ${batt}Ah battery can run your load for:\n${h} hr ${m} min ${s} sec`
    : `⏱ Your ${batt}Ah battery will ONLY last:\n${h} hr ${m} min ${s} sec`;

  // ==================== WIRES & BREAKERS ====================
  const solarWire = wireSizePEC(totalCurrent, V, solarDistance, solarBreakerValue);
  const controllerToBatteryCurrent = totalCurrent;
  const controllerToBatteryBreaker = nearestBreaker(controllerToBatteryCurrent * 1.25);
  const controllerToBatteryWire = wireSizePEC(controllerToBatteryCurrent, V, batteryDistance, controllerToBatteryBreaker);

  const batteryCurrent = load / V / inverterEff;
  const batteryBreaker = nearestBreaker(batteryCurrent * 1.25);
  const batteryWire = wireSizePEC(batteryCurrent, V, batteryDistance, batteryBreaker);
  let batteryWarn = "";
  if (batteryBreaker > 60 && V === 12) batteryWarn = "⚠️ High current → Consider 24V system";

  // ------------------- CONTROLLER SIZING -------------------
  const controllerAmp = nearestControllerAmp(totalCurrent); // recommended MPPT/PWM current
  const controllerBreaker = nearestBreaker(controllerAmp); // 125% rule for breaker
  const controllerType = totalVoltage > V + 5 ? "MPPT (Recommended)" : "PWM (OK, MPPT better)";

  // Render results
  document.getElementById("results").innerHTML = `
<h3 style="text-align:center; color:#00c853;">⚡ RESULT</h3>
<div><strong>🔋 Battery (${batteryType.toUpperCase()})</strong><br>
Needed: <span style="color:#ffea00;">${battNeeded}Ah</span> | Your: <span style="color:#00b0ff;">${batt}Ah</span><br>
${runtimeText}
</div>

<div><strong>☀️ Solar Panel</strong><br>
${solarNeededW}W needed | ${connectionUsed}<br>
Voltage/Current: ${totalVoltage.toFixed(0)}V / ${totalCurrent.toFixed(1)}A<br>
Breaker (Solar → MPPT): <span style="color:#ff1744;">${solarBreakerValue}A DC</span><br>
Wire size (Solar → MPPT): <strong>${solarWire}</strong><br>
${solarBreakerWarning}
</div>

<div><strong>⚙️ Solar Controller</strong><br>
Type: ${controllerType}<br>
Recommended Size: <span style="color:#00b0ff;">${controllerAmp}A</span><br>
Breaker: <span style="color:#ff1744;">${controllerBreaker}A DC</span><br>
Wire size: <strong>${controllerToBatteryWire}</strong>
</div>

<div><strong>🔌 Battery → Inverter</strong><br>
Load: ${batteryCurrent.toFixed(1)}A DC <br>
Breaker: <span style="color:#ff1744;">${batteryBreaker}A</span><br>
Wire size: <strong>${batteryWire}</strong><br>
${batteryWarn}
</div>

<div><strong>Status:</strong> ${status}</div>
`;

}

// Controller sizes
function nearestControllerAmp(current) {
  const standard = [10,20,30,40,50,60,80,100];
  for(let s of standard) if(current <= s) return s;
  return 100;
}

// ==================== PEC WIRE SIZE ====================
function wireSizePEC(current, voltage, distance, breaker) {
  const awgTable = [
    {awg:"12 AWG", mm2:4, R:0.00521, maxA:20},
    {awg:"10 AWG", mm2:6, R:0.00328, maxA:30},
    {awg:"8 AWG", mm2:8, R:0.00206, maxA:40},
    {awg:"6 AWG", mm2:16, R:0.00130, maxA:55},
    {awg:"4 AWG", mm2:25, R:0.00082, maxA:70},
    {awg:"2 AWG", mm2:35, R:0.00051, maxA:95}
  ];

  const maxVDrop = 0.03 * voltage; // 3%

  for(let w of awgTable){
    if(w.maxA < breaker) continue; // must meet breaker
    const Vdrop = current * w.R * 2 * distance;
    if(Vdrop <= maxVDrop) return `${w.awg} (${w.mm2} mm²) - Vdrop ${Vdrop.toFixed(2)}V`;
  }

  return "1/0 AWG or larger (high current or long distance)";
}

// Breakers
function nearestBreaker(current) {
  const adjusted = current * 1.25;
  const breakers = [10,15,20,30,40,50,60,80,100,125];
  for (let b of breakers) if (adjusted <= b) return b;
  return 125;
}

setMode("design");
</script>
</body>
</html>
