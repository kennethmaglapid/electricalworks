<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MGLPD Solar Calculator</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #121212;
  color: white;
}

.container {
  padding: 20px;
}

h2 {
  text-align: center;
}

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  background: #333;
  color: white;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #00c853;
  color: white;
  font-size: 16px;
}

button:hover {
  background: #00a844;
}

.mode-buttons button {
  background: #2962ff;
}

.mode-buttons button.active {
  background: #0039cb;
}

.results {
  background: #263238;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
  white-space: pre-line;
}

/* LIGHT MODE STYLES */
.light {
  background: #f5f5f5;
  color: #111;
}

.light .card {
  background: #ffffff;
}

.light input, 
.light select {
  background: #e0e0e0;
  color: #000;
}

.light .results {
  background: #e3f2fd;
  color: #000;
}

.light button {
  background: #1976d2;
}

.light .mode-buttons button {
  background: #90caf9;
}

.light .mode-buttons button.active {
  background: #1565c0;
}
</style>
</head>
<body>

<div class="container">
  <div style="text-align:right; margin-bottom:10px;">
    <button onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
  </div>

  <h2>⚡ MGLPD</h2>
  <p style="text-align:center; font-weight:bold;">Solar Calculator</p>

  <div class="card mode-buttons">
    <button onclick="setMode('design')" id="btnDesign">🔧 Full System</button>
  </div>

  <div class="card" id="inputs"></div>

  <div class="card">
    <label>System Voltage</label>
    <select id="voltage">
      <option value="12">12V</option>
      <option value="24">24V</option>
      <option value="48">48V</option>
    </select>

    <label>Battery Type</label>
    <select id="batteryType">
      <option value="lifepo4">LiFePO4</option>
      <option value="lead">Lead Acid / AGM</option>
    </select>

    <label>Panel Watt (per panel)</label>
    <input id="panelWatt" placeholder="e.g. 470">
    <button onclick="calculate()">CALCULATE</button>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
// DARK MODE TOGGLE
window.onload = function () {
  const savedTheme = localStorage.getItem("theme");
  if (savedTheme === "light") {
    document.body.classList.add("light");
    document.getElementById("themeBtn").innerText = "☀️ Light";
  }
};

function toggleTheme() {
  document.body.classList.toggle("light");
  const btn = document.getElementById("themeBtn");
  if (document.body.classList.contains("light")) {
    btn.innerText = "☀️ Light";
    localStorage.setItem("theme", "light");
  } else {
    btn.innerText = "🌙 Dark";
    localStorage.setItem("theme", "dark");
  }
}

// MODES & INPUTS
let mode = "design";

function setMode(m) {
  mode = m;
  document.querySelectorAll(".mode-buttons button").forEach(b => b.classList.remove("active"));
  document.getElementById("btn" + capitalize(m)).classList.add("active");
  renderInputs();
  document.getElementById("results").innerText = "";
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function renderInputs() {
  let html = "";
  if (mode === "design") {
    html = `
      <label>Load (W)</label>
      <input id="load">
      <label>Hours/day</label>
      <input id="hours">
      <label>Your Battery (Ah)</label>
      <input id="battery">
      <label>Wire Distance (meters)</label>
      <input id="distance" placeholder="e.g. 5">
    `;
  } else if (mode === "battery") {
    html = `
      <label>Battery (Ah)</label>
      <input id="battery">
      <label>Load (W)</label>
      <input id="load">
    `;
  } else if (mode === "charge") {
    html = `
      <label>Battery (Ah)</label>
      <input id="battery">
    `;
  }
  document.getElementById("inputs").innerHTML = html;
}

// CALCULATION LOGIC
function calculate() {
  const V = parseFloat(document.getElementById("voltage").value);
  const batteryType = document.getElementById("batteryType").value;
  const panelWatt = parseFloat(document.getElementById("panelWatt").value) || 470;
  const sun = 3.8;
  const loss = 1.25;
  const batteryEff = batteryType === "lifepo4" ? 0.9 : 0.7;
  let result = "";

  if (mode === "design") {
    const load = parseFloat(document.getElementById("load").value);
    const hours = parseFloat(document.getElementById("hours").value);
    const batt = parseFloat(document.getElementById("battery").value);
    const distance = parseFloat(document.getElementById("distance").value);
    if (!load || !hours || !batt || !distance) return alert("Fill all fields");

    const Wh = load * hours;
    const solar = Math.ceil((Wh / sun) * loss);
    const panels = Math.ceil(solar / panelWatt);
    const battNeed = Math.ceil(Wh / V / batteryEff);
    const ctrl = Math.ceil((solar / V) * 1.2);
    const current = load / V;

    result = `
🔋 Battery Needed: ${battNeed}Ah (${batteryType.toUpperCase()})
☀️ Solar Needed: ${solar}W
🔢 Panels Needed: ${panels} pcs (${panelWatt}W each)

⚡ Charge Controller (Solar): ${ctrl}A
🔌 Inverter: ${inverterSize(load)}

📏 Wire Size: ${wireSize(current, distance)}
📏 Distance: ${distance} m
⚡ Current: ${current.toFixed(2)} A

🧯 Solar Breaker: ${nearest((solar / V) * 1.25)}
🔋 Battery Breaker: ${nearest(current * 1.25)}

Your battery runs ≈ ${(batt*V*batteryEff/load).toFixed(1)} hrs
`;
  }

  if (mode === "battery") {
    const load = parseFloat(document.getElementById("load").value);
    const batt = parseFloat(document.getElementById("battery").value);
    if (!load || !batt) return alert("Fill all fields");

    const runtime = (batt * V * batteryEff) / load;
    const current = load / V;

    result = `
🔋 Runtime: ${runtime.toFixed(2)} hrs
📏 Wire: ${wireSize(current, 5)}
🔌 Inverter: ${inverterSize(load)}
`;
  }

  if (mode === "charge") {
    const batt = parseFloat(document.getElementById("battery").value);
    if (!batt) return alert("Enter battery");

    const solar = Math.ceil((batt * V / sun) * 1.15);
    const panels = Math.ceil(solar / panelWatt);
    const ctrl = Math.ceil((solar / V) * 1.2);

    result = `
🔋 Battery: ${batt}Ah (${batteryType.toUpperCase()})
☀️ Solar Needed: ${solar}W
🔢 Panels: ${panels} pcs (${panelWatt}W)
⚡ Controller: ${ctrl}A
🧯 Breaker: ${nearest(solar/V*1.25)}
`;
  }

  document.getElementById("results").innerText = result;
}

// HELPER FUNCTIONS
function wireSize(current, distance) {
  let factor = distance / 5; // normalize distance
  let adjustedCurrent = current * factor;

  if (adjustedCurrent <= 10) return "2.5 mm² (14 AWG)";
  if (adjustedCurrent <= 15) return "4 mm² (12 AWG)";
  if (adjustedCurrent <= 25) return "6 mm² (10 AWG)";
  if (adjustedCurrent <= 40) return "10 mm² (7 AWG)";
  if (adjustedCurrent <= 60) return "16 mm² (5 AWG)";
  return "25 mm² (3 AWG)";
}

function inverterSize(load) {
  let size = load * 1.25;
  if (size <= 150) return "150W";
  if (size <= 300) return "300W";
  if (size <= 500) return "500W";
  if (size <= 1000) return "1000W";
  if (size <= 1500) return "1500W";
  if (size <= 2000) return "2000W";
  return Math.ceil(size / 500) * 500 + "W";
}

function nearest(a){
  const sizes=[10,15,20,25,30,40,50,60,80,100,125];
  for(let s of sizes){
    if(a<=s) return s+"A";
  }
  return "125A+";
}

// INITIAL SETUP
setMode("design");
</script>

</body>
</html>
